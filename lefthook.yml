# Lefthook — pre-commit quality gates for claude-pilot (TypeScript)
# https://github.com/evilmartians/lefthook
#
# Install: lefthook install
# Run manually: lefthook run pre-commit

pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: "src/**/*.ts"
      run: npx tsc --noEmit

    build:
      glob: "src/**/*.ts"
      run: npm run build

    json-syntax:
      glob: "*.json"
      run: >
        for f in {staged_files}; do
          python3 -c "import json; json.load(open('$f'))" 2>&1 || exit 1;
        done

    no-secrets:
      glob: "*.{ts,js,json,yml,yaml}"
      exclude: "lefthook*.yml"
      run: >
        grep -rn -E '(sk-ant-api|sk-ant-oat|AKIA[A-Z0-9]{16}|-----BEGIN (RSA |EC )?PRIVATE KEY)' {staged_files}
        && echo "Potential secret detected!" && exit 1 || true

    no-large-files:
      run: >
        for f in {staged_files}; do
          size=$(wc -c < "$f" 2>/dev/null || echo 0);
          if [ "$size" -gt 1048576 ]; then
            echo "File $f is $(( size / 1024 ))KB — exceeds 1MB limit";
            exit 1;
          fi;
        done
